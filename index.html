<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競馬ATV解析ツール</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* レイアウト・ボタン配置の追加・上書きCSS */
        .input-section {
            display: flex;
            flex-direction: column; /* 上下配置に変更 */
            gap: 15px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 1400px;
            align-items: stretch;
        }
        
        .inputs-container {
            display: flex;
            flex-direction: row; /* 横幅が狭くてもD1/D2は横並びを維持 */
            gap: 20px;
            width: 100%;
            min-width: 0; 
        }

        .action-box {
            display: flex;
            flex-direction: row; /* ボタン群を横並び */
            justify-content: flex-start; /* 左詰め */
            gap: 10px;
            width: 100%;
            flex-shrink: 0; 
            flex-wrap: wrap; /* 画面が極端に狭い場合の折り返し保険 */
        }

        /* 共通アクションボタン（独立したサイズ） */
        .action-btn {
            border: none;
            border-radius: 6px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            text-decoration: none;
            line-height: 1.3;
            padding: 10px 24px; /* 余白で自然なサイズを確保 */
            margin: 0;
            width: auto; /* 全幅ではなくコンテンツ幅に依存 */
            box-sizing: border-box;
        }

        .btn-run { background: #18bc9c; color: #fff; font-size: 16px; cursor: pointer; }
        .btn-run:hover { background-color: #128f76; }
        .btn-run:disabled { background-color: #95a5a6; cursor: not-allowed; }

        .btn-load { background: #2980b9; color: #fff; font-size: 14px; cursor: pointer; }
        .btn-load:hover { background-color: #1f618d; }

        .btn-save { background: #27ae60; color: #fff; font-size: 14px; cursor: pointer; }
        .btn-save:hover { background-color: #219150; }

        .btn-text-sp { display: none; }

        /* スマホ版レイアウト */
        @media (max-width: 768px) {
            .inputs-container { 
                gap: 10px; /* スマホ時は少し隙間を詰めて横並びを確保 */
            }
            .btn-text-pc { display: none; }
            .btn-text-sp { display: inline; } /* 2行ではなく短縮テキストを1行で表示 */
            .action-btn { padding: 10px 16px; } /* スマホ時は少し小さく */
            .btn-run { font-size: 15px; }
            .btn-load, .btn-save { font-size: 13px; }
        }
    </style>
</head>
<body>
    <div id="ui-ruler-v4">
        <div class="ticks" id="ruler-ticks-container"></div>
        <div class="guide bp-375"><span class="guide-tag" style="color:#fff;">375</span></div>
        <div class="guide bp-480"><span class="guide-tag" style="color:#fff;">480</span></div>
        <div class="guide bp-768"><span class="guide-tag" style="color:#fff;">768</span></div>
        <div class="guide bp-1024"><span class="guide-tag" style="color:#fff;">1024</span></div>
        <div class="guide bp-1100"><span class="guide-tag" style="color:#fff;">1100</span></div>
    </div>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 id="version-display" style="margin: 0;">競馬ATV解析ツール</h3>
        </div>

        <div class="input-section">
            <div class="inputs-container">
                <div class="input-box">
                    <label>データ①（出馬表・馬名辞書用） <button class="paste-btn" onclick="pasteFromClipboard('data1')">📋 貼付</button></label>
                    <textarea id="data1" class="input-data" placeholder="ここにデータ①を貼り付けてください"></textarea>
                </div>
                <div class="input-box">
                    <label>データ②（馬柱データ） <button class="paste-btn" onclick="pasteFromClipboard('data2')">📋 貼付</button></label>
                    <textarea id="data2" class="input-data" placeholder="ここにデータ②を貼り付けてください"></textarea>
                </div>
            </div>
            <div class="action-box">
                <button id="runBtn" class="action-btn btn-run" onclick="runAnalysis()">
                    <span class="btn-text-pc">▶ 解析実行</span>
                    <span class="btn-text-sp">▶ 解析</span>
                </button>
                
                <input type="file" id="loadProjectInput" accept=".json" style="display: none;" onchange="window.loadProject(event)">
                <label for="loadProjectInput" class="action-btn btn-load">
                    <span class="btn-text-pc">📂 データ読込</span>
                    <span class="btn-text-sp">📂 読込</span>
                </label>
                
                <button class="action-btn btn-save" onclick="window.saveProject()">
                    <span class="btn-text-pc">💾 データ保存</span>
                    <span class="btn-text-sp">💾 保存</span>
                </button>
            </div>
        </div>
        <div id="resultArea"></div>
    </div>

    <div id="month-prompt-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3>⚠️ 2歳戦 番組月判定</h3>
            <p style="font-size: 13px; color: #555; margin-bottom: 20px;">
                9月と10月が混在する開催週を検知しました。<br>
                牝馬の減量規定(-1.0kg)の適用有無を決定するため、このレースの番組上の月を選択してください。
            </p>
            <div class="modal-buttons">
                <button onclick="window.resolveMonth(9)" class="btn-sep">9月扱い (減量なし)</button>
                <button onclick="window.resolveMonth(10)" class="btn-oct">10月扱い (-1.0kg適用)</button>
            </div>
        </div>
    </div>
    
    <script src="version.js"></script>
    <script src="utils.js"></script>
    <script src="parser.js"></script>
    <script src="calculator.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
