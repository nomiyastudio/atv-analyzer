<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競馬ATV解析ツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h3 id="version-display" style="margin: 0;">競馬ATV解析ツール</h3>
        </div>

        <div class="input-section">
            <div class="inputs-container">
                <div class="input-box">
                    <label>データ①（出馬表・馬名辞書用） <button class="paste-btn" onclick="pasteFromClipboard('data1')">📋 貼り付け</button></label>
                    <textarea id="data1" class="input-data" placeholder="ここにデータ①を貼り付けてください"></textarea>
                </div>
                <div class="input-box">
                    <label>データ②（馬柱データ） <button class="paste-btn" onclick="pasteFromClipboard('data2')">📋 貼り付け</button></label>
                    <textarea id="data2" class="input-data" placeholder="ここにデータ②を貼り付けてください"></textarea>
                </div>
            </div>
            <div class="action-box">
                <input type="file" id="loadProjectInput" accept=".json" style="display: none;" onchange="window.loadProject(event)">
                <label for="loadProjectInput" style="cursor: pointer; background: #2980b9; color: #fff; padding: 12px 0; border-radius: 6px; font-size: 14px; font-weight: bold; display: block; text-align: center; transition: background-color 0.2s; margin-bottom: 0;">📂 データ読込</label>
                <button id="runBtn" class="run-btn" onclick="runAnalysis()">解析実行</button>
            </div>
        </div>
        <div id="resultArea"></div>
    </div>

    <div id="month-prompt-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3>⚠️ 2歳戦 番組月判定</h3>
            <p style="font-size: 13px; color: #555; margin-bottom: 20px;">
                9月と10月が混在する開催週を検知しました。<br>
                牝馬の減量規定(-1.0kg)の適用有無を決定するため、このレースの番組上の月を選択してください。
            </p>
            <div class="modal-buttons">
                <button onclick="window.resolveMonth(9)" class="btn-sep">9月扱い (減量なし)</button>
                <button onclick="window.resolveMonth(10)" class="btn-oct">10月扱い (-1.0kg適用)</button>
            </div>
        </div>
    </div>
    
    <script src="version.js"></script>
    <script src="utils.js"></script>
    <script src="parser.js"></script>
    <script src="calculator.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
